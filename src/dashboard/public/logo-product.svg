<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Agent API Gateway">
  <!-- Product mark: gateway arch + structured data nodes (distinct from NexusCore hub) -->
  <g transform="translate(32 32)">
    <!-- outer gateway frame -->
    <rect x="-22" y="-22" width="44" height="44" rx="8" stroke="currentColor" stroke-width="2" opacity="0.35"/>
    <!-- gateway pillars -->
    <path stroke="currentColor" stroke-width="2.5" stroke-linecap="round" d="M-12 14 V-6 Q-12 -14 0 -14 Q12 -14 12 -6 V14"/>
    <!-- threshold bar -->
    <line x1="-14" y1="14" x2="14" y2="14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    <!-- structured payload dots flowing through -->
    <g fill="currentColor">
      <circle cx="-6" cy="2" r="2.2"/>
      <circle cx="0" cy="-2" r="2.2"/>
      <circle cx="6" cy="2" r="2.2"/>
    </g>
    <!-- outbound signal chevron -->
    <path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M-4 8 L0 12 L4 8"/>
  </g>
</svg>
